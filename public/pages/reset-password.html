<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — EventPulse</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- Branding -->
  <div class="branding">
    <div class="brand-logo">
      <div class="brand-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#060d1f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></div>
      <h1>EventPulse</h1>
    </div>
    <div class="brand-divider"></div>
    <p class="tagline">Set a new password and<br>get back to the events you love.</p>
    <div class="brand-features">
      <div class="feature-pill">Enter OTP from your email</div>
      <div class="feature-pill">Choose a strong password</div>
      <div class="feature-pill">Redirected to login after reset</div>
    </div>
  </div>

  <!-- Form -->
  <form id="resetForm" class="auth-form" autocomplete="off" novalidate>

    <div class="form-header">
      <h2>Reset Password</h2>
      <p class="form-subtitle" id="emailHint">Enter OTP and set your new password</p>
    </div>

    <!-- 6 individual OTP boxes -->
    <div class="otp-boxes" id="otpBoxes">
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
      <input type="text" maxlength="1" pattern="[0-9]" inputmode="numeric" class="otp-digit" />
    </div>
    <input type="hidden" id="otp" />

    <div class="input-group has-toggle">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <input type="password" id="newPassword" placeholder=" " autocomplete="new-password" />
      <label for="newPassword">New Password</label>
      <button type="button" class="toggle-pass" onclick="togglePass('newPassword', this)" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>

    <div class="strength-bar" id="strengthBar">
      <div class="strength-segment" id="s1"></div>
      <div class="strength-segment" id="s2"></div>
      <div class="strength-segment" id="s3"></div>
      <div class="strength-segment" id="s4"></div>
    </div>

    <div class="input-group has-toggle">
      <span class="input-icon"><svg viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg></span>
      <input type="password" id="confirmPassword" placeholder=" " autocomplete="new-password" />
      <label for="confirmPassword">Confirm Password</label>
      <button type="button" class="toggle-pass" onclick="togglePass('confirmPassword', this)" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="btn-text">Reset Password →</span>
      <span class="btn-spinner"></span>
    </button>

    <p class="switch"><a href="forgot.html">← Request new OTP</a></p>

    <p id="msg"></p>

  </form>

  <script src="/js/particles.js"></script>
  <script src="/js/reset.js"></script>

</body>
</html>
