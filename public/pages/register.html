<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — EventZ</title>
  <link rel="stylesheet" href="/public/css/auth.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- Branding -->
  <div class="branding">
    <div class="brand-logo">
      <div class="brand-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#060d1f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></div>
      <h1>EventZ</h1>
    </div>
    <div class="brand-divider"></div>
    <p class="tagline">Your gateway to unforgettable<br>experiences and live events.</p>
    <div class="brand-features">
      <div class="feature-pill">Discover events near you</div>
      <div class="feature-pill">Instant ticket booking</div>
      <div class="feature-pill">Exclusive early access deals</div>
    </div>
  </div>

  <!-- Form -->
  <form id="registerForm" class="auth-form" autocomplete="off" novalidate>

    <div class="form-header">
      <h2>Create Account</h2>
      <p class="form-subtitle">Join thousands discovering amazing events</p>
    </div>

    <div class="input-group">
      <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <input type="text" id="name" placeholder=" " autocomplete="off" />
      <label for="name">Full Name</label>
    </div>

    <div class="input-group">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
      <input type="email" id="email" placeholder=" " autocomplete="off" />
      <label for="email">Email Address</label>
    </div>

    <div class="input-group">
      <span class="input-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.09 6.09l1.09-1.09a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
      <input type="tel" id="phone" placeholder=" " maxlength="10" />
      <label for="phone">Phone Number</label>
    </div>

    <div class="input-group has-toggle">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <input type="password" id="password" placeholder=" " autocomplete="new-password" />
      <label for="password">Password</label>
      <button type="button" class="toggle-pass" onclick="togglePass('password', this)" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>

    <div class="strength-bar" id="strengthBar">
      <div class="strength-segment" id="s1"></div>
      <div class="strength-segment" id="s2"></div>
      <div class="strength-segment" id="s3"></div>
      <div class="strength-segment" id="s4"></div>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="btn-text">Send OTP →</span>
      <span class="btn-spinner"></span>
    </button>

    <p class="switch">Already have an account? <a href="login.html">Sign in</a></p>

    <p id="msg"></p>

  </form>

  <script src="/public/js/particles.js"></script>
  <script src="/public/js/register.js"></script>
</body>
</html>
