<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — EventZ</title>
  <link rel="stylesheet" href="/public/css/auth.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- Branding -->
  <div class="branding">
    <div class="brand-logo">
      <div class="brand-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#060d1f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></div>
      <h1>EventZ</h1>
    </div>
    <div class="brand-divider"></div>
    <p class="tagline">Don't worry, it happens.<br>We'll get you back in seconds.</p>
    <div class="brand-features">
      <div class="feature-pill">OTP sent to your email</div>
      <div class="feature-pill">Valid for 10 minutes</div>
      <div class="feature-pill">Secure password reset</div>
    </div>
  </div>

  <!-- Form -->
  <form id="forgotForm" class="auth-form" autocomplete="off" novalidate>

    <div class="form-header">
      <h2>Forgot Password</h2>
      <p class="form-subtitle">Enter your email to receive a reset OTP</p>
    </div>

    <div class="input-group">
      <span class="input-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
      <input type="email" id="email" placeholder=" " autocomplete="off" />
      <label for="email">Email Address</label>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="btn-text">Send Reset OTP →</span>
      <span class="btn-spinner"></span>
    </button>

    <p class="switch">Remember your password? <a href="login.html">Sign in</a></p>

    <p id="msg"></p>

  </form>

  <script src="/public/js/particles.js"></script>
  <script src="/public/js/forgot.js"></script>
</body>
</html>
