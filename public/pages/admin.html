<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/public/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Header -->
  <header class="admin-header">
    <div class="header-content">
      <div class="header-left">
        <div class="header-icon"><i class="fas fa-shield-alt"></i></div>
        <div>
          <h1>Admin Panel</h1>
          <p>Manage your events and tickets</p>
        </div>
      </div>
      <button class="scan-btn" onclick="goScan()"><i class="fas fa-qrcode"></i> Scan Tickets</button>
    </div>
  </header>

  <main class="admin-main">

    <!-- Create/Edit Event Form -->
    <section class="form-section animate-fade-in">
      <div class="section-title-bar">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Create Event</h2>
        <span id="editBadge" class="edit-badge hidden"><i class="fas fa-pen"></i> Editing</span>
      </div>

      <form id="eventForm" class="event-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="title"><i class="fas fa-heading"></i> Event Title</label>
            <input type="text" id="title" placeholder="Enter event title" required />
          </div>
          <div class="form-group">
            <label for="date"><i class="fas fa-calendar-alt"></i> Date</label>
            <input type="date" id="date" required />
          </div>
          <div class="form-group">
            <label for="location"><i class="fas fa-map-marker-alt"></i> Location</label>
            <input type="text" id="location" placeholder="Event location" />
          </div>
          <div class="form-group">
            <label for="image"><i class="fas fa-image"></i> Image URL</label>
            <input type="text" id="image" placeholder="https://..." />
          </div>
        </div>

        <div class="form-group full-width">
          <label for="description"><i class="fas fa-align-left"></i> Description</label>
          <textarea id="description" placeholder="Describe your event..." rows="3"></textarea>
        </div>

        <!-- Tickets Section -->
        <div class="tickets-section">
          <div class="tickets-header">
            <h3><i class="fas fa-ticket-alt"></i> Tickets</h3>
            <button type="button" class="add-ticket-btn" onclick="addTicket()"><i class="fas fa-plus"></i> Add Ticket</button>
          </div>
          <div id="ticketsContainer"></div>
        </div>

        <div class="form-actions">
          <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-rocket"></i> Create Event</button>
          <button type="button" class="cancel-btn hidden" id="cancelEditBtn" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
        </div>
        <p id="msg" class="form-msg"></p>
      </form>
    </section>

    <!-- Events List -->
    <section class="events-section animate-fade-in" style="animation-delay:0.2s">
      <h2><i class="fas fa-calendar-check"></i> Your Events</h2>
      <div id="adminEvents" class="events-grid"></div>
    </section>

  </main>

  <script src="/public/js/admin.js"></script>
</body>
</html>
