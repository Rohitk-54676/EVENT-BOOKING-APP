<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Ticket — EventPulse</title>
  <link rel="stylesheet" href="/css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- NAVBAR -->
  <header class="navbar" id="navbar">
    <div class="nav-left">
      <a class="logo" href="/pages/index.html">EventPulse</a>
    </div>
    <nav class="nav-center">
      <a href="/pages/index.html">Home</a>
      <a href="/pages/list-events.html">Events</a>
      <a href="/pages/admin.html">Admin</a>
    </nav>
    <div class="nav-right">
      <a href="/pages/admin.html" class="btn-nav">
        ← Back to Admin
      </a>
      <button class="btn-nav danger" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- HERO -->
  <section class="admin-hero">
    <div class="hero-eyebrow"><span class="dot"></span>Ticket Verification</div>
    <h1>Scan <span class="grad-text">Tickets</span></h1>
    <p>Verify attendee tickets via camera or manual code entry.</p>
  </section>

  <!-- SCAN LAYOUT -->
  <main class="scan-main">

    <!-- QR SCANNER CARD -->
    <div class="scan-card animate-fade-in">
      <div class="scan-card-header">
        <div class="scan-card-icon" style="background:rgba(247,37,133,.12);border-color:rgba(247,37,133,.25);">
          <span>📷</span>
        </div>
        <div>
          <h3>QR Scanner</h3>
          <p>Point camera at the ticket QR code</p>
        </div>
      </div>

      <div class="scan-btns">
        <button class="btn-scan-start" onclick="startScanner()">
          ▶ Start Camera
        </button>
        <button class="btn-scan-stop" onclick="stopScanner()">
          ⏹ Stop
        </button>
      </div>

      <div id="reader" class="qr-reader"></div>
    </div>

    <!-- MANUAL ENTRY CARD -->
    <div class="scan-card animate-fade-in" style="animation-delay:.12s">
      <div class="scan-card-header">
        <div class="scan-card-icon" style="background:rgba(76,201,240,.12);border-color:rgba(76,201,240,.25);">
          <span>⌨️</span>
        </div>
        <div>
          <h3>Manual Entry</h3>
          <p>Type or paste the ticket code below</p>
        </div>
      </div>

      <div class="manual-input-wrap">
        <input type="text" id="code" placeholder="e.g. TKT-ABC123XYZ" />
        <button class="btn-verify" onclick="verify()">
          Verify ✓
        </button>
      </div>

      <div id="msg" class="scan-msg"></div>
    </div>

  </main>

  <footer class="footer">
    <p>© 2026 <b>EventPulse</b>. Admin Panel.</p>
  </footer>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="/js/scan.js"></script>
</body>
</html>
